<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Adventure in CS</title>
  <meta name="description" content="自学计算机基础的完整路线图与资源索引">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #e2a44f;
      --text-color: #dddde5;
      --bg-color: #0f0f23;
      --sidebar-bg: #0a0a1a;
      --sidebar-nav-link-color: #889;
      --sidebar-nav-link-color--active: #e2a44f;
      --sidebar-width: 280px;
    }
    body { background: var(--bg-color); color: var(--text-color); font-family: "Segoe UI", -apple-system, sans-serif; }
    .sidebar { background: var(--sidebar-bg); }
    .sidebar-nav li a { font-size: 15px; }
    .markdown-section { max-width: 900px; padding: 20px 40px; }
    .markdown-section h1 { font-size: 2.5em; color: var(--theme-color); border-bottom: 2px solid var(--theme-color); padding-bottom: .3em; }
    .markdown-section h2 { font-size: 1.6em; color: var(--theme-color); margin-top: 2em; }
    .markdown-section table { display: table; width: 100%; }
    .markdown-section th { background: #1a1a35; color: var(--theme-color); }
    .markdown-section td { background: #111128; }
    .markdown-section a { color: var(--theme-color); }
    .markdown-section blockquote { border-left-color: var(--theme-color); background: #111128; color: #aaa; }
    .app-name-link { font-size: 1.2em; color: var(--theme-color) !important; }
    .search input { background: #111128; color: #ddd; border: 1px solid #333; }
    @media (max-width: 768px) { .markdown-section { padding: 10px 16px; } }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'My Adventure in CS 🚀',
      repo: 'chrysos371/my-adventure-in-cs',
      loadSidebar: false,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: '搜索',
        noData: '没有结果',
        paths: 'auto'
      },
      plugins: [
        function(hook) {
          hook.afterEach(function(html) {
            return html.replace(/<table>/g, '<div style="overflow-x:auto"><table>')
                       .replace(/<\/table>/g, '</table></div>');
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
